name: UET Advanced Programming CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # JOB 1: Dành cho Bài 3 (Giữ nguyên của bạn)
  # ==========================================
  build-bai3:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Bai3

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (Test and Package)
        run: ./mvnw clean test package

      - name: Store JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: banksystem-jar
          path: Bai3/target/*.jar

  # ==========================================
  # JOB 2: Dành cho Bài 4 (Matrix Strategy)
  # ==========================================
  test-matrix-bai4:
    strategy:
      fail-fast: false # Nếu Ubuntu lỗi thì Windows/Mac vẫn tiếp tục chạy
      matrix:
        # Chạy đồng thời trên 3 hệ điều hành
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./Bai4

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Matrix Tests
        # Cấp quyền thực thi cho Wrapper và chạy test
        run: |
          chmod +x mvnw
          ./mvnw clean test
  # ==========================================
  # JOB 3: Test Coverage & Quality Enforcement (Bài 5)
  # ==========================================
  coverage-check-bai5:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Bai5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests and Check Coverage
        # Lệnh 'verify' sẽ chạy test, đo coverage và kích hoạt luật > 80% của JaCoCo
        run: |
          chmod +x mvnw
          ./mvnw verify

      - name: Upload JaCoCo Report Artifact
        uses: actions/upload-artifact@v4
        # Dùng if: always() để đảm bảo báo cáo luôn được lưu lại kể cả khi test fail
        if: always()
        with:
          name: jacoco-coverage-report
          path: Bai5/target/site/jacoco/
  # ==========================================
  # JOB 4: Pipeline Optimization & Caching (Bài 6)
  # ==========================================
  cache-optimization-bai6:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Bai6

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17 with Maven Cache
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

          cache: 'maven'

      - name: Build and Test
        run: |
          chmod +x mvnw
          ./mvnw clean test