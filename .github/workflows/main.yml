name: UET Advanced Programming CI

on:
  push:
    # Đảm bảo chạy trên cả master và main của Đạt
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  # ==========================================
  # JOB 1: Bài 3 (Đã thêm chmod +x)[cite: 1, 2]
  # ==========================================
  build-bai3:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Bai3
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: |
          chmod +x mvnw
          ./mvnw clean test package
      - name: Store JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: banksystem-jar
          path: Bai3/target/*.jar

  # ==========================================
  # JOB 2: Bài 4 (Matrix)[cite: 2]
  # ==========================================
  test-matrix-bai4:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./Bai4
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run Matrix Tests
        run: |
          chmod +x mvnw
          ./mvnw clean test

  # ==========================================
  # JOB 3: Bài 5 (JaCoCo)[cite: 2]
  # ==========================================
  coverage-check-bai5:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Bai5
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run Tests and Check Coverage
        run: |
          chmod +x mvnw
          ./mvnw verify
      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: Bai5/target/site/jacoco/

  # ==========================================
  # JOB 4: Bài 6 (Caching)[cite: 2]
  # ==========================================
  cache-optimization-bai6:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Bai6
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17 with Maven Cache
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build and Test
        run: |
          chmod +x mvnw
          ./mvnw clean test